name: Backend CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]


permissions:
  contents: read        # needed for checkout etc.
  packages: write 

jobs:
  ci:
    name: Validate Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check index.js


  cd:
    name: Build, Push and Deploy Backend
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/refund-backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.IMAGE_OWNER }}/refund-backend:latest

      - name: Deploy backend over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          IMAGE_NAMESPACE: ghcr.io/${{ env.IMAGE_OWNER }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,IMAGE_NAMESPACE,GHCR_USERNAME,GHCR_TOKEN,DATABASE_URL,JWT_SECRET,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET
          script: |
            set -e
            mkdir -p ${{ secrets.SERVER_DEPLOY_PATH }}/deploy
            cd ${{ secrets.SERVER_DEPLOY_PATH }}
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            cat > deploy/.env.backend <<EOT
            PORT=3000
            DATABASE_URL=$DATABASE_URL
            JWT_SECRET=$JWT_SECRET
            CLOUDINARY_CLOUD_NAME=$CLOUDINARY_CLOUD_NAME
            CLOUDINARY_API_KEY=$CLOUDINARY_API_KEY
            CLOUDINARY_API_SECRET=$CLOUDINARY_API_SECRET
            EOT
            cat > .env <<EOT
            IMAGE_REGISTRY=$IMAGE_NAMESPACE
            IMAGE_TAG=$IMAGE_TAG
            EOT
            docker compose -f docker-compose.backend.yml pull
            docker compose -f docker-compose.backend.yml up -d --remove-orphans
            docker image prune -f

            